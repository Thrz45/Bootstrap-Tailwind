<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <!-- parent div -->
     <div class="bg-sky-500 h-screen flex flex-col justify-between w-[600px]">

        <!-- child -->
         <p class="bg-red-600 w-[100px] h-[100px] text-center order-2">Box 1</p>
         <p class="bg-green-400 w-[100px] h-[100px] text-center order-1">Box 2</p>
         <p class="bg-fuchsia-400 w-[100px] h-[100px] text-center order-3">Box 3</p>
         
     </div>
</body>
</html>
